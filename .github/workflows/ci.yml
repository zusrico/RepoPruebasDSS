name: CI

# Este workflow se ejecuta en pushes y pull requests a la rama main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Checkout del código del repositorio
    - name: Checkout code
      uses: actions/checkout@v4

    # Paso 2: Configurar Python (versión 3.9)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # Paso 3: Instalar dependencias (si hay un requirements.txt, lo instala)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Paso 4: Ejecutar el script de validación para probar que funciona
    - name: Run validation script
      run: |
        python dni_validator.py <<< "salir"

    # Paso 5: Instalar y ejecutar linter (flake8) para verificar estilo del código
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 dni_validator.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 dni_validator.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics